<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard | TECSA Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1a1a1a;
        }

        .dark {
            --bg-color: #1a1a1a;
            --text-color: #f5f5f5;
        }

        body {
            background-color: var(--bg-color) !important;
            color: var(--text-color) !important;
        }

        .status-new { border-top: 6px solid #3b82f6; }
        .status-active { border-top: 6px solid #eab308; }
        .status-processing { border-top: 6px solid #f97316; }
        .status-completed { border-top: 6px solid #22c55e; }

        .sheet-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-active { border-bottom: 2px solid currentColor; font-weight: 800; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col transition-colors duration-200 overflow-x-hidden">

    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>
    <div id="overlay" class="fixed inset-0 bg-black/40 hidden z-40 backdrop-blur-sm transition-opacity" onclick="closeSheet()"></div>
    <div id="products-overlay" class="fixed inset-0 bg-black/40 hidden z-50 backdrop-blur-sm transition-opacity" onclick="toggleProductsPanel()"></div>

    <header class="flex justify-between items-center p-4 bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-30 transition-colors">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">

            </div>
            <span class="text-2xl font-black tracking-tighter">TECSA<span class="font-light text-gray-400">CRM</span></span>
        </div>

        <div id="topTabs" class="hidden md:flex gap-8">
            <button onclick="setFilter(null, this)" class="tab-active text-xs uppercase tracking-widest py-1" data-i18n="tab_all">All</button>
            <button onclick="setFilter('new', this)" class="text-xs text-gray-400 uppercase tracking-widest py-1 hover:text-black dark:hover:text-white transition-colors" data-i18n="status_new">New</button>
            <button onclick="setFilter('active', this)" class="text-xs text-gray-400 uppercase tracking-widest py-1 hover:text-black dark:hover:text-white transition-colors" data-i18n="status_active">Active</button>
            <button onclick="setFilter('processing', this)" class="text-xs text-gray-400 uppercase tracking-widest py-1 hover:text-black dark:hover:text-white transition-colors" data-i18n="status_processing">Processing</button>
            <button onclick="setFilter('completed', this)" class="text-xs text-gray-400 uppercase tracking-widest py-1 hover:text-black dark:hover:text-white transition-colors" data-i18n="status_completed">Completed</button>
        </div>

        <div class="flex items-center gap-2">
            <div class="flex items-center gap-1 bg-gray-100 dark:bg-gray-900 p-1 rounded-xl">
                <button onclick="setLanguage('en')" id="lang-en" class="px-3 py-1.5 text-xs font-black rounded-lg">EN</button>
                <button onclick="setLanguage('ua')" id="lang-ua" class="px-3 py-1.5 text-xs font-black rounded-lg">UA</button>
            </div>
            <button onclick="toggleProductsPanel()" class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Products Catalog">

            </button>
            <button onclick="toggleTrashModal()" class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors relative" data-i18n-title="trash_title" title="Trash">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>

                <svg class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
            </button>
            <button id="logoutBtn" onclick="logout()" class="p-2.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl hidden transition-colors" data-i18n-title="logout_title" title="Logout">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 p-6 md:p-10 lg:px-16 overflow-y-auto">
        <div id="welcomeState" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 -z-10 hidden">
        </div>

        <div id="tasks-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
        </div>

        <button onclick="showNewTaskForm()" class="fixed bottom-8 right-8 w-16 h-16 bg-black dark:bg-white text-white dark:text-black rounded-full shadow-2xl flex items-center justify-center hover:scale-105 transition-transform z-20 focus:outline-none focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600">

        </button>

                <div>
                    <input type="email" id="email" data-i18n-placeholder="email_placeholder" placeholder="Work Email" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-black dark:focus:ring-white transition-all font-medium">
                    <p id="emailError" class="text-red-500 text-xs mt-2 font-bold hidden px-2"></p>
                </div>
                <div>
                    <input type="password" id="password" data-i18n-placeholder="password_placeholder" placeholder="Password" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-black dark:focus:ring-white transition-all font-medium">
                    <p id="passwordError" class="text-red-500 text-xs mt-2 font-bold hidden px-2"></p>
                </div>
                <div id="generalAuthError" class="text-red-500 text-sm font-bold text-center hidden"></div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase tracking-tighter flex items-center gap-3" data-i18n="trash_title">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Trash

                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="trashList" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
            <div class="mt-6 pt-6 border-t border-gray-100 dark:border-gray-700 flex justify-between items-center">
                <span id="trashCount" class="text-sm font-bold text-gray-400">0 items</span>
                <button onclick="emptyTrash()" id="emptyTrashBtn" class="text-sm font-bold text-red-500 hover:text-red-600 uppercase tracking-widest hidden transition-colors" data-i18n="empty_trash_btn">Empty Trash</button>
            </div>
        </div>
    </div>

        <div class="flex justify-between items-center p-6 border-b border-gray-100 dark:border-gray-700">

            <button onclick="toggleProductsPanel()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="products-list" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    </div>

        const mockProducts = [
            { name: 'Spectrophotometer SF-56', price: 4500, sku: 'TEC-SPEC-001' },
            { name: 'Magnetic Stirrer MS-3000', price: 750, sku: 'TEC-STIR-002' },
            { name: 'Digital Microscope DM-X4', price: 1200, sku: 'TEC-MICR-003' },
            { name: 'Laboratory Centrifuge LC-8', price: 2100, sku: 'TEC-CENT-004' }
        ];

        function setLanguage(lang) {
            localStorage.setItem('language', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.textContent = translations[lang][key] || el.textContent;
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = translations[lang][key] || el.placeholder;
            });
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.getAttribute('data-i18n-title');
                el.title = translations[lang][key] || el.title;
            });

            const enBtn = document.getElementById('lang-en');
            const uaBtn = document.getElementById('lang-ua');
            if (lang === 'ua') {
                uaBtn.classList.add('bg-white', 'dark:bg-gray-700', 'shadow');
                enBtn.classList.remove('bg-white', 'dark:bg-gray-700', 'shadow');
            } else {
                enBtn.classList.add('bg-white', 'dark:bg-gray-700', 'shadow');
                uaBtn.classList.remove('bg-white', 'dark:bg-gray-700', 'shadow');
            }
            loadTasks();
        }

        function toggleProductsPanel() {
            const panel = document.getElementById('products-panel');
            const overlay = document.getElementById('products-overlay');
            const isOpen = !panel.classList.contains('translate-x-full');

            if (isOpen) {
                panel.classList.add('translate-x-full');
                overlay.classList.add('hidden');
            } else {
                renderProducts();
                panel.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
            }
        }

        function renderProducts() {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            const lang = localStorage.getItem('language') || 'en';
            mockProducts.forEach(p => {
                const el = document.createElement('div');
                el.className = 'bg-gray-50 dark:bg-gray-900/50 p-4 rounded-2xl border border-gray-100 dark:border-gray-700';
                el.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="font-bold">${p.name}</div>
                        <div class="font-black text-green-600 dark:text-green-400">${p.price.toLocaleString(lang === 'ua' ? 'uk-UA' : 'en-US', {style:'currency', currency:'USD'})}</div>
                    </div>
                    <div class="text-xs text-gray-400 font-bold uppercase mt-1">SKU: ${p.sku}</div>
                `;
                list.appendChild(el);
            });
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            html.classList.toggle('light');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { error: 'bg-red-500 text-white', success: 'bg-green-500 text-white', info: 'bg-black text-white dark:bg-white dark:text-black' };

            toast.className = `toast-enter flex items-center p-4 rounded-2xl shadow-xl ${colors[type]} max-w-sm pointer-events-auto border border-black/5 dark:border-white/10`;
            toast.innerHTML = `<div class="flex-1 text-sm font-bold">${message}</div><button onclick="this.parentElement.remove()" class="ml-4 opacity-50 hover:opacity-100"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>`;
            container.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });
            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-exit');
                requestAnimationFrame(() => {
                    toast.classList.add('toast-exit-active');
                    setTimeout(() => toast.remove(), 300);
                });
            }, 4000);
        }

        function clearAuthErrors() {
            ['emailError', 'passwordError', 'generalAuthError'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['email', 'password'].forEach(id => document.getElementById(id).classList.remove('ring-red-500', 'ring-2'));
        }

        function showAuthError(msg, field = 'general') {
            if (field === 'email' || field === 'password') {
                const el = document.getElementById(`${field}Error`);
                el.textContent = msg;
                el.classList.remove('hidden');
                document.getElementById(field).classList.add('ring-red-500', 'ring-2');
            } else {
                const el = document.getElementById('generalAuthError');
                el.textContent = msg;
                el.classList.remove('hidden');
            }
        }

        async function fetchWrapper(endpoint, options = {}) {
            const headers = { ...options.headers, 'Accept-Language': localStorage.getItem('language') || 'en' };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            try {
                const res = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
                if (res.status === 204) return { success: true, data: null };
                const data = await res.json().catch(() => null);

                if (!res.ok) {
                    if (res.status === 401 && endpoint !== '/auth/login') {
                        logout(false);
                        return { success: false, error: 'Session expired', status: 401 };
                    }
                    let errMsg = data?.message || data?.detail;
                    if(typeof errMsg !== 'string') errMsg = JSON.stringify(errMsg);
                    return { success: false, error: errMsg || 'An error occurred', status: res.status };
                }
                return { success: true, data, status: res.status };
            } catch (err) {
                return { success: false, error: 'Network connection failed', status: 0 };
            }
        }

        async function register() {
            clearAuthErrors();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email) return showAuthError('Email required', 'email');
            if (!password) return showAuthError('Password required', 'password');

            const res = await fetchWrapper('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.success) {
                showToast('Account created! Logging in...', 'success');
                login();
            } else {
                showAuthError(res.error, res.status === 422 ? 'email' : 'general');
            }
        }

        async function login() {
            clearAuthErrors();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email) return showAuthError('Email required', 'email');
            if (!password) return showAuthError('Password required', 'password');

            const res = await fetchWrapper('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.success) {
                token = res.data.access_token;
                localStorage.setItem('token', token);
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                loadTasks();
            } else {
                showAuthError(res.error, res.status === 401 ? 'password' : 'general');
            }
        }

        function logout(showMsg = true) {
            token = null;
            localStorage.removeItem('token');
            document.getElementById('authModal').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('tasks-grid').innerHTML = '';
            document.getElementById('welcomeState').classList.remove('hidden');

        async function updateStatus(id, status, comment = null) {
            const payload = { status };
            if (comment) payload.comment = comment;

            const res = await fetchWrapper(`/tasks/${id}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.success) {
                showToast(`Moved to ${status}`, 'success');
                await loadTasks();
                const updated = currentTasks.find(t => t.id === id);
                if(updated) openSheet(updated);
                else closeSheet();
            } else {
                showToast(res.error, 'error');
            }
        }

        async function rollbackTask(id, currentStatus) {
            let previousStatus;
            switch (currentStatus) {
                case 'completed': previousStatus = 'processing'; break;
                case 'processing': previousStatus = 'active'; break;
                case 'active': previousStatus = 'new'; break;
                default: showToast('Cannot rollback from "new" status', 'info'); return;
            }

            const res = await fetchWrapper(`/tasks/${id}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: previousStatus })
            });

            if (res.success) {
                showToast(`Task moved back to ${previousStatus}`, 'success');
                await loadTasks();
                const updated = currentTasks.find(t => t.id === id);
                if (updated) openSheet(updated);
                else closeSheet();
            } else {
                showToast(res.error, 'error');
            }
        }

        async function deleteTask(id) {
            const res = await fetchWrapper(`/tasks/${id}`, { method: 'DELETE' });
            if (res.success) {
                showToast('Moved to trash', 'info');
                closeSheet();
                loadTasks();
            } else showToast(res.error, 'error');
        }

        async function handleFileUpload(taskId) {
            const input = document.getElementById('fileUpload');
            if (!input.files.length) return;

            const formData = new FormData();
            for (let i = 0; i < input.files.length; i++) {
                formData.append('files', input.files[i]);
            }

            showToast('Uploading files...', 'info');

            const res = await fetchWrapper(`/tasks/${taskId}/files`, { method: 'POST', body: formData });
            if (res.success) {
                showToast('Files attached', 'success');
                await loadTasks();
                openSheet(currentTasks.find(t => t.id === taskId));
            } else {
                showToast(res.error, 'error');
            }
        }

        async function generatePdf(taskId) {
            showToast('Generating PDF...', 'info');
            try {
                const res = await fetch(`${API_URL}/tasks/${taskId}/pdf`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept-Language': localStorage.getItem('language') || 'en'
                    }
                });

                if (!res.ok) {
                    const errorData = await res.json().catch(() => null);
                    showToast(errorData?.detail || 'Failed to generate PDF', 'error');
                    return;
                }

                const blob = await res.blob();
                const contentDisposition = res.headers.get('Content-Disposition');
                let filename = `task_${taskId}_proposal.pdf`;
                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename="([^"]+)"/);
                    if (filenameMatch && filenameMatch[1]) {
                        filename = filenameMatch[1];
                    }
                }

                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                showToast('PDF generated and downloaded!', 'success');

            } catch (error) {
                showToast('Network error or failed to generate PDF', 'error');
                console.error('PDF generation error:', error);
            }
        }


        async function toggleTrashModal() {
            const modal = document.getElementById('trashModal');
            if (modal.classList.contains('hidden')) {
                const res = await fetchWrapper('/tasks/deleted');
                if (res.success) {
                    renderTrashList(res.data);
                    modal.classList.remove('hidden');
                } else showToast(res.error, 'error');
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderTrashList(tasks) {
            const list = document.getElementById('trashList');
            const btn = document.getElementById('emptyTrashBtn');
            const count = document.getElementById('trashCount');
            const lang = localStorage.getItem('language') || 'en';
            list.innerHTML = '';
            count.textContent = `${tasks.length} items`;

            if (tasks.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-gray-400 font-bold">${translations[lang].trash_empty || 'Trash is empty'}</div>`;
                btn.classList.add('hidden');
                return;
            }

            btn.classList.remove('hidden');
            tasks.forEach(task => {
                const el = document.createElement('div');
                el.className = 'p-4 bg-gray-50 dark:bg-gray-800/50 rounded-2xl flex justify-between items-center group';
                el.innerHTML = `
                    <div class="overflow-hidden mr-4">
                        <div class="font-bold line-through opacity-50 truncate">${task.title}</div>
                        <div class="text-xs font-bold text-gray-400 uppercase mt-1">${translations[lang][`type_${task.task_type}`]}</div>
                    </div>
                    <button onclick="restoreTask(${task.id})" class="shrink-0 bg-black dark:bg-white text-white dark:text-black px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:scale-105 transition-transform">${translations[lang].restore_btn}</button>
                `;
                list.appendChild(el);
            });
        }

        async function emptyTrash() {
            if(!confirm('Permanently delete all items?')) return;
            const res = await fetchWrapper('/tasks/deleted/empty', { method: 'DELETE' });
            if (res.success) {
                showToast('Trash emptied', 'success');
                document.getElementById('trashModal').classList.add('hidden');
            } else showToast(res.error, 'error');
        }

        async function restoreTask(id) {
            const res = await fetchWrapper(`/tasks/${id}/restore`, { method: 'PATCH' });
            if (res.success) {
                showToast('Task restored', 'success');
                const listRes = await fetchWrapper('/tasks/deleted');
                if (listRes.success) renderTrashList(listRes.data);
                loadTasks();
            } else showToast(res.error, 'error');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('language') || 'en';
            setLanguage(savedLang);

            if(!token) {
                document.getElementById('authModal').classList.remove('hidden');
            } else {
                document.getElementById('logoutBtn').classList.remove('hidden');
                loadTasks();
            }
        });
    </script>
</body>
</html>
